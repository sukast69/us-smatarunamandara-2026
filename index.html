<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Mencegah Cache di Exambrowser -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Portal Ujian - SMA Taruna Mandara</title>
    
    <!-- Tailwind CSS CDN & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .shimmer {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%; 
            animation-duration: 1.5s;
            animation-fill-mode: forwards; 
            animation-iteration-count: infinite;
            animation-name: placeholderShimmer;
            animation-timing-function: linear;
        }
        @keyframes placeholderShimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-blue-100 min-h-screen flex flex-col no-select relative z-0">

    <!-- Dekorasi Latar Belakang -->
    <div class="fixed top-0 left-0 w-full h-[500px] bg-gradient-to-b from-blue-50/80 to-transparent -z-10 pointer-events-none"></div>
    <div class="fixed top-[-10%] right-[-5%] w-[500px] h-[500px] rounded-full bg-blue-100/40 blur-3xl -z-10 pointer-events-none"></div>

    <!-- NAVBAR PREMIUM -->
    <nav class="glass-nav fixed top-0 w-full z-50 px-4 sm:px-6 py-4 flex justify-between items-center shadow-[0_4px_30px_rgba(0,0,0,0.03)]">
        <div class="flex items-center space-x-3 sm:space-x-4">
            <div class="w-10 h-10 sm:w-11 sm:h-11 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <div>
                <h1 id="secret-trigger" class="font-extrabold text-base sm:text-lg leading-tight tracking-tight text-slate-900 cursor-default">Ujian Sekolah Berbasis Komputer</h1>
                <p class="text-[10px] sm:text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">SMA Taruna Mandara Tahun 2026</p>
            </div>
        </div>

        <!-- Indikator Waktu & Sinkronisasi -->
        <div class="flex items-center gap-2">
            <button onclick="forceSync()" class="hidden sm:flex p-2 bg-white rounded-full shadow-sm border border-slate-200 hover:bg-slate-50 text-slate-500 hover:text-blue-600 transition-colors" title="Sinkronisasi Waktu Ulang">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
            
            <div class="bg-slate-900 text-white px-4 py-2 sm:py-2.5 rounded-full shadow-lg flex items-center space-x-2.5 border border-slate-700/50 backdrop-blur-sm">
                <div id="pulse-dot" class="w-2 h-2 sm:w-2.5 sm:h-2.5 bg-slate-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(255,255,255,0.2)]"></div>
                <span id="live-clock" class="font-mono text-sm sm:text-base tracking-widest font-semibold text-slate-300">Menyambungkan...</span>
            </div>
        </div>
    </nav>

    <!-- KONTEN UTAMA: DAFTAR JADWAL -->
    <main class="flex-grow pt-32 pb-12 px-4 sm:px-6 lg:px-8 max-w-[96%] 2xl:max-w-[1600px] mx-auto w-full">
        <!-- Header Section -->
        <div class="mb-10 sm:flex sm:items-end sm:justify-between border-b border-slate-200/60 pb-5">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Jadwal Hari Ini</h2>
                <p class="text-slate-500 mt-2 font-medium text-sm sm:text-base">Silakan ikuti sesi ujian sesuai dengan urutan waktu yang ditentukan.</p>
            </div>
            <!-- Tanggal Dinamis -->
            <div class="mt-4 sm:mt-0 bg-white/60 backdrop-blur-sm border border-slate-200/60 px-4 py-2 rounded-lg inline-block">
                <p id="live-date" class="text-sm font-bold text-slate-700 flex items-center">
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Memuat Tanggal...
                </p>
            </div>
        </div>

        <!-- Container List Jadwal (Diubah kembali menjadi 3 Grid Kolom Full Width) -->
        <div id="schedule-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 xl:gap-8">
            
            <!-- Skeleton Vertical (Card 1) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-6 sm:p-7 shadow-sm flex flex-col h-[320px]">
                <div class="shimmer w-28 h-6 rounded-full mb-6"></div>
                <div class="flex-grow space-y-3">
                    <div class="shimmer w-full h-8 rounded-lg"></div>
                    <div class="shimmer w-3/4 h-8 rounded-lg"></div>
                </div>
                <div class="mt-auto pt-6 border-t border-slate-100">
                    <div class="w-full h-12 shimmer rounded-xl mb-3"></div>
                </div>
            </div>
            
            <!-- Skeleton Vertical (Card 2) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-6 sm:p-7 shadow-sm flex flex-col h-[320px] hidden md:flex">
                <div class="shimmer w-28 h-6 rounded-full mb-6"></div>
                <div class="flex-grow space-y-3">
                    <div class="shimmer w-full h-8 rounded-lg"></div>
                    <div class="shimmer w-3/4 h-8 rounded-lg"></div>
                </div>
                <div class="mt-auto pt-6 border-t border-slate-100">
                    <div class="w-full h-12 shimmer rounded-xl mb-3"></div>
                </div>
            </div>
            
            <!-- Skeleton Vertical (Card 3) -->
            <div class="bg-white border border-slate-100 rounded-3xl p-6 sm:p-7 shadow-sm flex flex-col h-[320px] hidden lg:flex">
                <div class="shimmer w-28 h-6 rounded-full mb-6"></div>
                <div class="flex-grow space-y-3">
                    <div class="shimmer w-full h-8 rounded-lg"></div>
                    <div class="shimmer w-3/4 h-8 rounded-lg"></div>
                </div>
                <div class="mt-auto pt-6 border-t border-slate-100">
                    <div class="w-full h-12 shimmer rounded-xl mb-3"></div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center bg-white border-t border-slate-200/60 mt-auto">
        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            SISTEM KEBUT SEMALAM & SING MAAN KOPI! RAHAYU SARENG SAMI #IZINNNN! 😁
        </p>
    </footer>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const JADWAL_HARI_INI = [
            {
                id: 1,
                mapel: "Simulasi dan Uji Coba US",
                buka: "22:00", 
                tutup: "23:00", 
                link: "https://forms.gle/ContohLinkSesi1" 
            },
            {
                id: 2,
                mapel: "Matematika Tingkat Lanjut",
                buka: "22:30", 
                tutup: "23:30", 
                link: "" 
            },
            {
                id: 3,
                mapel: "Bahasa Inggris",
                buka: "23:30", 
                tutup: "00:30", 
                link: "" 
            }
        ];

        let overrideActive = false;
        let waktuServerAktif = 0; 
        let currentRenderedMinute = ""; 

        function formatTanggalIndo(dateObj) {
            const hari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            return `${hari[dateObj.getDay()]}, ${dateObj.getDate()} ${bulan[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
        }

        // FUNGSI RENDER UI KARTU JADWAL (3 Grid Seragam)
        function renderScheduleUI(jamMenitSekarang) {
            const container = document.getElementById('schedule-container');
            container.innerHTML = ""; 

            JADWAL_HARI_INI.forEach((sesi, index) => {
                let cardHTML = "";
                
                // Menentukan kelas layout seragam untuk 3 grid vertikal
                const layoutClasses = "col-span-1 flex flex-col h-full";
                const leftSectionClasses = "flex-grow mb-6";
                const rightSectionClasses = "mt-auto pt-5 border-t border-slate-100";
                const titleSize = "text-xl sm:text-2xl";

                // KONDISI A: BELUM MULAI (WAITING)
                if (jamMenitSekarang < sesi.buka) {
                    cardHTML = `
                        <div class="${layoutClasses} bg-white/80 backdrop-blur-sm border border-slate-200/80 rounded-3xl p-6 sm:p-8 shadow-sm opacity-75 hover:opacity-100 transition-all duration-300 group">
                            <div class="${leftSectionClasses}">
                                <span class="inline-block px-3 py-1.5 bg-slate-100 text-slate-600 text-[10px] font-extrabold uppercase tracking-widest rounded-full border border-slate-200 mb-4">
                                    Menunggu Jadwal
                                </span>
                                <h3 class="${titleSize} font-extrabold text-slate-800 tracking-tight leading-snug mb-3 group-hover:text-slate-900">${sesi.mapel}</h3>
                                <p class="text-sm text-slate-500 font-medium">Sesi dibuka pukul <br class="hidden xl:block"/><span class="text-slate-800 font-bold bg-slate-100 px-2 py-0.5 rounded inline-block mt-1 sm:mt-0 xl:mt-1">${sesi.buka} WITA</span></p>
                            </div>
                            
                            <div class="${rightSectionClasses} border-slate-200/60">
                                <button disabled class="w-full px-6 py-4 bg-slate-100 text-slate-400 font-bold rounded-xl cursor-not-allowed border border-slate-200/60 transition-all">
                                    BELUM DIBUKA
                                </button>
                                <p class="text-[11px] text-slate-400 font-medium mt-3 text-center w-full">
                                    * Tombol akan aktif otomatis
                                </p>
                            </div>
                        </div>
                    `;
                } 
                // KONDISI B: WAKTU UJIAN (ACTIVE)
                else if (jamMenitSekarang >= sesi.buka && jamMenitSekarang < sesi.tutup) {
                    let actionButton = "";
                    let helperText = "";

                    if (sesi.link !== "") {
                        actionButton = `
                            <a href="${sesi.link}" class="w-full px-6 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white shadow-[0_8px_20px_rgba(37,99,235,0.25)] font-bold rounded-xl flex items-center justify-center transition-all duration-300 transform active:scale-95 group/btn">
                                MULAI UJIAN
                                <svg class="w-5 h-5 ml-2 group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        `;
                        helperText = "* Siapkan token dari pengawas";
                    } else {
                        actionButton = `
                            <button onclick="window.location.reload()" class="w-full px-6 py-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 shadow-lg shadow-slate-300 transition-all active:scale-95 flex items-center justify-center group/btn">
                                <svg class="w-4 h-4 mr-2 group-hover/btn:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                REFRESH HALAMAN
                            </button>
                        `;
                        helperText = "* Menunggu sinkronisasi soal";
                    }

                    cardHTML = `
                        <div class="${layoutClasses} bg-white rounded-3xl p-6 sm:p-8 shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-blue-100 relative overflow-hidden transform hover:-translate-y-1 transition-all duration-300">
                            <!-- Efek Glow Atas -->
                            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
                            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-400/10 blur-3xl rounded-full -z-10 pointer-events-none"></div>

                            <div class="${leftSectionClasses} relative z-10 pl-1 md:pl-2">
                                <span class="inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-700 text-[10px] font-extrabold uppercase tracking-widest rounded-full border border-blue-100/50 mb-4">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-600 mr-2 animate-pulse"></span>
                                    Sesi Aktif
                                </span>
                                <h3 class="${titleSize} font-extrabold text-slate-900 tracking-tight leading-snug mb-3">${sesi.mapel}</h3>
                                <p class="text-sm text-slate-500 font-medium">Batas pengerjaan: <br class="hidden xl:block"/><span class="text-rose-500 font-bold bg-rose-50 px-2 py-0.5 rounded inline-block mt-1 sm:mt-0 xl:mt-1">${sesi.tutup} WITA</span></p>
                            </div>
                            
                            <div class="${rightSectionClasses} relative z-10">
                                ${actionButton}
                                <p class="text-[11px] text-slate-500 font-medium mt-3 text-center w-full">
                                    ${helperText}
                                </p>
                            </div>
                        </div>
                    `;
                } 
                // KONDISI C: SUDAH SELESAI (ENDED)
                else {
                    cardHTML = `
                        <div class="${layoutClasses} bg-slate-50 border border-slate-200/80 rounded-3xl p-6 sm:p-8 opacity-60 grayscale-[40%]">
                            <div class="${leftSectionClasses}">
                                <span class="inline-block px-3 py-1.5 bg-slate-200 text-slate-500 text-[10px] font-extrabold uppercase tracking-widest rounded-full border border-slate-300/50 mb-4">
                                    Sesi Berakhir
                                </span>
                                <h3 class="${titleSize} font-bold text-slate-700 line-through decoration-slate-400 decoration-2 leading-snug mb-3">${sesi.mapel}</h3>
                                <p class="text-sm text-slate-500 font-medium">Waktu pengerjaan telah habis</p>
                            </div>
                            
                            <div class="${rightSectionClasses} border-slate-200/60">
                                <div class="w-full px-6 py-4 bg-white text-slate-400 font-bold rounded-xl border-2 border-slate-200 flex items-center justify-center">
                                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                    DITUTUP
                                </div>
                                <p class="text-[11px] text-rose-500 font-medium mt-3 text-center w-full">
                                    * Akses otomatis dinonaktifkan
                                </p>
                            </div>
                        </div>
                    `;
                }

                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        async function syncTime() {
            const clockEl = document.getElementById('live-clock');
            const dotEl = document.getElementById('pulse-dot');
            const dateEl = document.getElementById('live-date');
            
            clockEl.innerText = "Syncing...";
            dotEl.className = "w-2 h-2 sm:w-2.5 sm:h-2.5 bg-amber-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(251,191,36,0.5)]";

            try {
                const response = await fetch('https://time.now/developer/api/timezone/Asia/Makassar');
                if (!response.ok) throw new Error("API Gagal");
                
                const data = await response.json();
                waktuServerAktif = data.unixtime * 1000;
                
                dotEl.className = "w-2 h-2 sm:w-2.5 sm:h-2.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.5)]";
                clockEl.classList.replace('text-slate-300', 'text-white');
                clockEl.innerText = "Tersambung"; 

                dateEl.parentElement.style.display = 'inline-block';
                dateEl.innerHTML = `
                    <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    ${formatTanggalIndo(new Date(waktuServerAktif))}
                `;
                
            } catch (error) {
                waktuServerAktif = new Date().getTime(); 
                dotEl.className = "w-2 h-2 sm:w-2.5 sm:h-2.5 bg-rose-500 rounded-full shadow-[0_0_8px_rgba(244,63,94,0.5)]";
                clockEl.innerText = "Offline Mode";
                dateEl.parentElement.style.display = 'none';
            }
        }

        function forceSync() {
            syncTime();
            currentRenderedMinute = ""; 
        }

        function runTimer() {
            if (overrideActive || waktuServerAktif === 0) return;

            waktuServerAktif += 1000; 
            
            const waktuSekarang = new Date(waktuServerAktif);
            const h = waktuSekarang.getHours().toString().padStart(2, '0');
            const m = waktuSekarang.getMinutes().toString().padStart(2, '0');
            const s = waktuSekarang.getSeconds().toString().padStart(2, '0');
            
            const clockEl = document.getElementById('live-clock');
            if(clockEl.innerText !== "Syncing...") {
                clockEl.innerText = `${h}:${m}:${s} WITA`;
            }

            const jamMenitSekarang = `${h}:${m}`;

            if (jamMenitSekarang !== currentRenderedMinute) {
                renderScheduleUI(jamMenitSekarang);
                currentRenderedMinute = jamMenitSekarang;
            }
        }

        let clickCount = 0;
        let clickTimer;
        document.getElementById('secret-trigger').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 2000); 

            if (clickCount >= 5) {
                overrideActive = true;
                clickCount = 0;
                document.getElementById('live-clock').innerText = "MODE DARURAT";
                document.getElementById('pulse-dot').className = "w-2.5 h-2.5 bg-amber-400 rounded-full animate-ping";
                
                renderScheduleUI("99:99"); 
            }
        });

        syncTime().then(() => {
            setInterval(runTimer, 1000); 
        });

    </script>
</body>
</html>
